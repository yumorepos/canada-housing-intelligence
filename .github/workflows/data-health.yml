name: Data Health

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python scripts/data_health_check.py --report-out artifacts/data_health_report.json
      - name: Upload data health artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-health-report
          path: artifacts/data_health_report.json
